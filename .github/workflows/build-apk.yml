name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev

    - name: 安装 Python 依赖
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.33

    - name: 缓存 Buildozer 全局目录
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}

    - name: 缓存 Buildozer 构建目录
      uses: actions/cache@v3
      with:
        path: |
          .buildozer
        key: buildozer-build-${{ hashFiles('buildozer.spec') }}

    - name: 构建 APK
      run: |
        yes | buildozer android debug
      env:
        ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: dog-control-apk
        path: bin/*.apk
